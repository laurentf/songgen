<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="12" fill="#0f0f1a"/>

  <!-- Pixel art S -->
  <!-- Top bar -->
  <rect x="26" y="18" width="8" height="8" fill="#06b6d4"/>
  <rect x="34" y="18" width="8" height="8" fill="#06b6d4"/>
  <rect x="42" y="18" width="8" height="8" fill="#22d3ee"/>
  <rect x="50" y="18" width="8" height="8" fill="#22d3ee"/>
  <rect x="58" y="18" width="8" height="8" fill="#67e8f9"/>

  <!-- Top-left vertical -->
  <rect x="18" y="26" width="8" height="8" fill="#06b6d4"/>
  <rect x="18" y="34" width="8" height="8" fill="#22d3ee"/>

  <!-- Middle bar -->
  <rect x="26" y="42" width="8" height="8" fill="#ec4899"/>
  <rect x="34" y="42" width="8" height="8" fill="#f472b6"/>
  <rect x="42" y="42" width="8" height="8" fill="#f472b6"/>
  <rect x="50" y="42" width="8" height="8" fill="#f9a8d4"/>
  <rect x="58" y="42" width="8" height="8" fill="#ec4899"/>

  <!-- Bottom-right vertical -->
  <rect x="66" y="50" width="8" height="8" fill="#f472b6"/>
  <rect x="66" y="58" width="8" height="8" fill="#f9a8d4"/>

  <!-- Bottom bar -->
  <rect x="18" y="66" width="8" height="8" fill="#67e8f9"/>
  <rect x="26" y="66" width="8" height="8" fill="#22d3ee"/>
  <rect x="34" y="66" width="8" height="8" fill="#06b6d4"/>
  <rect x="42" y="66" width="8" height="8" fill="#22d3ee"/>
  <rect x="50" y="66" width="8" height="8" fill="#06b6d4"/>
  <rect x="58" y="66" width="8" height="8" fill="#ec4899"/>

  <!-- Sound waves (right side, small pixels) -->
  <rect x="86" y="28" width="4" height="4" fill="#06b6d4" opacity="0.4"/>
  <rect x="86" y="36" width="4" height="4" fill="#ec4899" opacity="0.6"/>
  <rect x="86" y="44" width="4" height="4" fill="#06b6d4" opacity="0.4"/>

  <rect x="90" y="32" width="4" height="4" fill="#ec4899" opacity="0.3"/>
  <rect x="90" y="40" width="4" height="4" fill="#06b6d4" opacity="0.3"/>

  <!-- Bottom pixel accent -->
  <rect x="28" y="84" width="4" height="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="32" y="84" width="4" height="4" fill="#22d3ee" opacity="0.6"/>
  <rect x="40" y="84" width="4" height="4" fill="#f472b6" opacity="0.8"/>
  <rect x="44" y="84" width="4" height="4" fill="#ec4899" opacity="0.6"/>
  <rect x="52" y="84" width="4" height="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="56" y="84" width="4" height="4" fill="#22d3ee" opacity="0.6"/>
  <rect x="64" y="84" width="4" height="4" fill="#f472b6" opacity="0.8"/>
  <rect x="68" y="84" width="4" height="4" fill="#ec4899" opacity="0.6"/>
</svg>
